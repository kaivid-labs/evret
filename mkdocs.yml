site_name: Evret
site_description: Retriever evaluation framework for Information retreival and search systems
site_url: https://kaivid-labs.github.io/evret/
repo_name: evret
repo_url: https://github.com/kaivid-labs/evret
exclude_docs: README.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            heading_level: 2

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Quickstart: quickstart.md
  - Judges: judges.md
  - Architecture: architecture.md
  - Metrics:
      - Metrics Overview: metrics/index.md
      - Hit Rate: metrics/hit-rate.md
      - Recall: metrics/recall.md
      - Precision: metrics/precision.md
      - MRR: metrics/mrr.md
      - nDCG: metrics/ndcg.md
      - Average Precision: metrics/average-precision.md
  - Evaluation:
      - Evaluation Overview: evaluation/overview.md
      - Dataset Format: evaluation/dataset-format.md
  - Retrievers:
      - Retriever Overview: retrievers/overview.md
      - Qdrant Retriever: retrievers/qdrant.md
      - Chroma Retriever: retrievers/chroma.md
      - Weaviate Retriever: retrievers/weaviate.md
      - Milvus Retriever: retrievers/milvus.md
  - Integrations:
      - Integration Overview: integrations/overview.md
  - API Reference:
      - Package: api/package.md
      - Metrics API: api/metrics.md
      - Judges API: api/judges.md
      - Evaluation API: api/evaluation.md
      - Retrievers API: api/retrievers.md
      - Integrations API: api/integrations.md
